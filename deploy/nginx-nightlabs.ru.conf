# Host nginx site for nightlabs.ru -> DevCast web container (127.0.0.1:8090).
# certbot --nginx adds the TLS (443) block and the HTTP->HTTPS redirect.
server {
    listen 80;
    listen [::]:80;
    server_name nightlabs.ru www.nightlabs.ru;

    client_max_body_size 25m;

    # SSE — no buffering, long-lived connection.
    location /api/events/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
