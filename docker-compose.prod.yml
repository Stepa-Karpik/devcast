# Production stack for DevCast. Isolated compose project: `devcast`.
# DB/Redis are internal-only (no host ports). Web is exposed on 127.0.0.1:8090,
# fronted by the host nginx for nightlabs.ru.
services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: devcast
      POSTGRES_PASSWORD: devcast
      POSTGRES_DB: devcast
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devcast"]
      interval: 5s
      timeout: 3s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  backend:
    build: ./backend
    restart: unless-stopped
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://devcast:devcast@postgres:5432/devcast
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./backend
    restart: unless-stopped
    command: arq app.workers.queue.WorkerSettings
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://devcast:devcast@postgres:5432/devcast
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE: https://nightlabs.ru
    restart: unless-stopped
    ports:
      - "127.0.0.1:8090:80"
    depends_on:
      - backend

volumes:
  pgdata:
